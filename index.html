// ── State ─────────────────────────────────────────────────────────────────────
const TOTAL = questions.length;
let userAnswers = {}, answeredCount = 0, correctCount = 0;

// ── Build DOM ────────────────────────────────────────────────────────────────
function buildQuestions() {
  const container = document.getElementById('questions-container');

  // Section labels (approximate groupings)
  const sections = {
    1:  'GI-kirurgi',
    11: 'Anestesi & perioperativ vård',
    21: 'Ortopedi',
    32: 'Radiologi & bildtolkning',
    33: 'Kärlkirurgi',
    34: 'Onkologi',
    37: 'Akutkirurgi & mjukdelar',
    41: 'Bröstcancer',
    42: 'Plastikkirurgi',
    44: 'Handkirurgi',
    46: 'Tyreoideakirurgi',
    48: 'Urologi',
    49: 'Brännskador',
    50: 'Endokrinkirurgi',
    62: 'Obesitaskirurgi',
    74: 'Trauma',
    76: 'Sepsis'
  };

  questions.forEach(q => {
    if (sections[q.num]) {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = sections[q.num];
      container.appendChild(label);
    }

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${q.num}`;

    const opts = q.options.map((opt, i) =>
      `<button class="opt-btn" id="opt-${q.num}-${i+1}" onclick="answer(${q.num}, ${i+1})">${opt}</button>`
    ).join('');

card.innerHTML = `
  <div class="q-header">
    <div class="q-num">${q.num}</div>
    <div class="q-text">
      ${q.image ? `<img src="${q.image}" alt="Frågebild" class="question-image">` : ""}
      ${q.text}
    </div>
  </div>
  <div class="options">${opts}</div>`;
    container.appendChild(card);
  });
}

function answer(qNum, chosen) {
  if (userAnswers[qNum] !== undefined) return;
  userAnswers[qNum] = chosen;
  answeredCount++;

  const q = questions.find(q => q.num === qNum);
  const isCorrect = chosen === q.correct;
  if (isCorrect) correctCount++;

  // Style buttons
  q.options.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qNum}-${i+1}`);
    btn.classList.add('locked');
    if (i + 1 === q.correct)      btn.classList.add('correct');
    else if (i + 1 === chosen)    btn.classList.add('wrong');
  });

  // Style card
  const card = document.getElementById(`card-${qNum}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  // Update header
  document.getElementById('score-display').textContent = `${correctCount} / ${TOTAL}`;
  document.getElementById('answered-display').textContent = `${answeredCount} besvarade`;
  document.getElementById('progress-bar').style.width = (answeredCount / TOTAL * 100) + '%';

  if (answeredCount === TOTAL) document.getElementById('finish-btn').style.display = 'block';
}

function showResults() {
  document.getElementById('finish-btn').style.display = 'none';
  const el = document.getElementById('results');
  el.style.display = 'block';

  const pct = Math.round(correctCount / TOTAL * 100);
  document.getElementById('final-score').textContent = `${correctCount} / ${TOTAL}`;
  document.getElementById('percent-text').textContent = pct + '% rätt';

  let grade = '';
  if (pct >= 90)      grade = '🏆 Utmärkt! Strålande resultat.';
  else if (pct >= 75) grade = '✅ Bra jobbat! Godkänt med råge.';
  else if (pct >= 60) grade = '📚 Godkänt – men det finns mer att repetera.';
  else                grade = '💪 Håll inte modet nere – identifiera svagheterna och repetera!';
  document.getElementById('grade-text').textContent = grade;

  const wrong = questions.filter(q => userAnswers[q.num] !== q.correct);
  if (wrong.length === 0) {
    document.getElementById('wrong-list').innerHTML =
      '<p style="color:#28a745;font-weight:700;font-size:1.1rem">🎉 Perfekt! Alla rätt!</p>';
  } else {
    document.getElementById('wrong-list').innerHTML =
      `<h3>Fel svar – ${wrong.length} frågor att repetera:</h3>` +
      wrong.map(q => {
        const yourAns = q.options[userAnswers[q.num] - 1];
        const rightAns = q.options[q.correct - 1];
        return `<div class="wrong-item">
          <strong>Fråga ${q.num}:</strong> Du svarade: <em>"${yourAns}"</em><br>
          <span class="right-ans">✓ Rätt svar: "${rightAns}"</span>
        </div>`;
      }).join('');
  }

  el.scrollIntoView({ behavior: 'smooth' });
}

buildQuestions();
</script>
